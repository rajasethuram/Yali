<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YALI HUD</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
  <script src="/static/animations.js" defer></script>
</head>
<body>
  <div class="hud">
    <div class="panel header">YALI SYSTEM ONLINE</div>
    <div class="row">
      <div class="panel" id="wake-status">Wake: IDLE</div>
      <div class="panel" id="cpu">CPU: --%</div>
      <div class="panel" id="mem">MEM: --%</div>
    </div>
    <div class="panel" id="agents">Agents: Idle</div>
    <div class="panel" id="pipeline">Pipeline: -</div>
    <div class="panel input-section">
      <input type="text" id="task-input" placeholder="Enter task..." autofocus>
      <button id="submit-btn">Submit</button>
    </div>
    <div class="panel logs" id="logs">Logs:\n</div>
  </div>
</body>
</html>
