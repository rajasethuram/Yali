<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Yali OS — Command Center</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(10% 0.012 240);
  --panel: oklch(13% 0.015 240);
  --panel-2: oklch(16% 0.015 240);
  --border: oklch(22% 0.02 240);
  --border-strong: oklch(30% 0.025 240);
  --fg: oklch(95% 0.005 240);
  --muted: oklch(58% 0.015 240);
  --bar-bg: oklch(18% 0.018 240);
  --accent:     oklch(65% 0.17 218);
  --accent-dim: oklch(45% 0.12 218);
  --indigo:     oklch(60% 0.18 260);
  --violet:     oklch(62% 0.17 290);
  --cyan:       oklch(72% 0.13 210);
  --ok:         oklch(70% 0.17 155);
  --warn:       oklch(75% 0.15 70);
  --danger:     oklch(65% 0.21 25);
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --card-pad: 16px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--sans); color: var(--fg); -webkit-font-smoothing: antialiased; }
#root { height: 100%; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
button { font-family: var(--sans); }
input, textarea { font-family: var(--sans); }
input::placeholder, textarea::placeholder { color: var(--muted); }
.kicker { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-family: var(--mono); font-weight: 500; margin-bottom: 4px; }
.yali-btn { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); padding: 7px 12px; border-radius: 6px; font-size: 11px; font-family: var(--mono); cursor: pointer; transition: all 0.15s; }
.yali-btn:hover { background: var(--panel); border-color: var(--accent-dim); color: var(--accent); }
.yali-btn-primary { background: linear-gradient(135deg, var(--accent), var(--indigo)); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 11px; font-family: var(--mono); cursor: pointer; letter-spacing: 1px; transition: all 0.15s; box-shadow: 0 0 14px color-mix(in oklab, var(--accent) 30%, transparent); }
.yali-btn-primary:hover { filter: brightness(1.1); }
.yali-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.yali-card { animation: yali-fade-in 0.4s ease both; }
.yali-row:hover { background: color-mix(in oklab, var(--accent) 3%, transparent); }
.yali-fade { animation: yali-fade-in 0.4s ease both; }
@keyframes yali-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes yali-pulse { 0%,100%{box-shadow:0 0 0 0 color-mix(in oklab,var(--danger) 30%,transparent)} 50%{box-shadow:0 0 0 10px transparent} }
@keyframes yali-ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes yali-dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">

// ─── SHARED PRIMITIVES ────────────────────────────────────────────────

function Card({ children, style, pad, className = "", title, kicker, right }) {
  const p = pad ?? 'var(--card-pad)';
  return (
    <div className={`yali-card ${className}`} style={{
      background: "var(--panel)", border: "1px solid var(--border)",
      borderRadius: 14, padding: p, position: "relative", ...style,
    }}>
      {(title || kicker || right) && (
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:12, gap:12 }}>
          <div style={{ minWidth:0 }}>
            {kicker && <div className="kicker">{kicker}</div>}
            {title && <div style={{ fontSize:14, color:"var(--fg)", fontWeight:500, letterSpacing:0.2 }}>{title}</div>}
          </div>
          {right && <div style={{ flexShrink:0 }}>{right}</div>}
        </div>
      )}
      {children}
    </div>
  );
}

function Kicker({ children, color="var(--muted)" }) {
  return <div style={{ fontSize:9.5, color, textTransform:"uppercase", letterSpacing:2, fontFamily:"var(--mono)", fontWeight:500 }}>{children}</div>;
}

function StatDot({ color="var(--accent)", size=7, pulse=false }) {
  return <span style={{ display:"inline-block", width:size, height:size, borderRadius:"50%", background:color, boxShadow:`0 0 ${size*1.6}px ${color}`, animation:pulse?"yali-pulse 1.8s ease-in-out infinite":"none", flexShrink:0 }} />;
}

function Chip({ children, color="var(--accent)", style={} }) {
  return <span style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:10, padding:"3px 10px", borderRadius:20, fontFamily:"var(--mono)", letterSpacing:0.3, color, background:`color-mix(in oklab, ${color} 12%, transparent)`, border:`1px solid color-mix(in oklab, ${color} 30%, transparent)`, whiteSpace:"nowrap", ...style }}>{children}</span>;
}

function Bar({ value, max=100, color="var(--accent)", height=4 }) {
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return <div style={{ background:"var(--bar-bg)", borderRadius:height, height, overflow:"hidden" }}><div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:height, transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)" }} /></div>;
}

function Display({ children, size=28, color="var(--fg)", style={} }) {
  return <span style={{ fontFamily:"var(--display)", fontSize:size, color, letterSpacing:size>32?3:2, fontWeight:400, lineHeight:1, ...style }}>{children}</span>;
}

function Divider({ vertical=false, style={} }) {
  return <div style={{ background:"var(--border)", ...(vertical?{width:1,alignSelf:"stretch"}:{height:1,width:"100%"}), ...style }} />;
}

function Tag({ children, color="var(--muted)" }) {
  return <span style={{ fontSize:9, color, fontFamily:"var(--mono)", textTransform:"uppercase", letterSpacing:1.5 }}>{children}</span>;
}

function Ring({ value=0, size=56, stroke=4, color="var(--accent)", label, sub }) {
  const r = (size-stroke)/2, c = 2*Math.PI*r, off = c-(value/100)*c;
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bar-bg)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition:"stroke-dashoffset 1s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontFamily:"var(--display)", fontSize:size*0.32, color, letterSpacing:1 }}>{label??value}</div>
        {sub && <div style={{ fontSize:8, color:"var(--muted)", textTransform:"uppercase", letterSpacing:1 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Spinner() {
  return <div style={{ width:16, height:16, border:"2px solid var(--border)", borderTop:`2px solid var(--accent)`, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />;
}

// ─── WEBSOCKET HOOK ───────────────────────────────────────────────────
// onMessage ref prevents WebSocket reconnect on every render

function useYaliWS(onMessage) {
  const wsRef  = React.useRef(null);
  const cbRef  = React.useRef(onMessage);
  React.useEffect(() => { cbRef.current = onMessage; });

  React.useEffect(() => {
    const connect = () => {
      const ws = new WebSocket(`ws://${location.host}/ws`);
      wsRef.current = ws;
      ws.onmessage = (e) => { try { cbRef.current(JSON.parse(e.data)); } catch {} };
      ws.onclose = () => setTimeout(connect, 3000);
    };
    connect();
    return () => wsRef.current?.close();
  }, []); // runs once only
  return wsRef;
}

// ─── HOME VIEW ────────────────────────────────────────────────────────

const AGENTS = [
  { id:"orchestrator", name:"Orchestrator", role:"Intent router", status:"active", load:34, calls:1284, x:50, y:50, core:true },
  { id:"planner",   name:"Planner",   role:"Decomposes commands",     status:"active", load:18, calls:412,  x:18, y:20 },
  { id:"executor",  name:"Executor",  role:"Runs subtasks + tools",   status:"active", load:62, calls:1072, x:82, y:20 },
  { id:"validator", name:"Validator", role:"PASS / FAIL gate",        status:"active", load:12, calls:398,  x:15, y:78 },
  { id:"healer",    name:"Healer",    role:"RETRY / ESCALATE",        status:"idle",   load:4,  calls:47,   x:50, y:90 },
  { id:"finance",   name:"Finance",   role:"Markets · predict",       status:"active", load:41, calls:228,  x:85, y:78 },
  { id:"memory",    name:"Memory",    role:"3-tier context",          status:"active", load:22, calls:1284, x:50, y:14 },
];

function AgentGraph() {
  const core = AGENTS.find(a => a.core);
  const spokes = AGENTS.filter(a => !a.core);
  return (
    <div style={{ position:"relative", aspectRatio:"1.55/1", width:"100%" }}>
      <svg viewBox="0 0 100 65" preserveAspectRatio="none" style={{ position:"absolute", inset:0, width:"100%", height:"100%" }}>
        <defs><radialGradient id="core-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.25" /><stop offset="100%" stopColor="var(--accent)" stopOpacity="0" /></radialGradient></defs>
        <circle cx={core.x} cy={core.y*0.65} r="18" fill="url(#core-glow)" />
        {spokes.map(s => <line key={s.id} x1={core.x} y1={core.y*0.65} x2={s.x} y2={s.y*0.65} stroke={s.status==="active"?"var(--accent)":"var(--border-strong)"} strokeWidth="0.15" strokeDasharray={s.status==="active"?"0":"0.6 0.6"} opacity={s.status==="active"?0.55:0.3} />)}
        {spokes.filter(s=>s.status==="active").map((s,i) => (
          <circle key={`p-${s.id}`} r="0.6" fill="var(--accent)" opacity="0.9">
            <animateMotion dur={`${2+(i%3)*0.6}s`} repeatCount="indefinite" path={`M${s.x},${s.y*0.65} L${core.x},${core.y*0.65}`} begin={`${i*0.4}s`} />
          </circle>
        ))}
      </svg>
      <div style={{ position:"absolute", left:`${core.x}%`, top:`${core.y*0.65}%`, transform:"translate(-50%,-50%)", textAlign:"center" }}>
        <div style={{ width:78, height:78, borderRadius:"50%", background:"radial-gradient(circle, color-mix(in oklab, var(--accent) 20%, transparent) 0%, var(--panel) 75%)", border:"1.5px solid var(--accent)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", boxShadow:"0 0 32px color-mix(in oklab, var(--accent) 30%, transparent)" }}>
          <div style={{ fontFamily:"var(--display)", fontSize:22, color:"var(--accent)", letterSpacing:3 }}>YALI</div>
          <div style={{ fontSize:7, color:"var(--muted)", textTransform:"uppercase", letterSpacing:1.5, marginTop:2 }}>core · v2</div>
        </div>
      </div>
      {spokes.map(a => (
        <div key={a.id} style={{ position:"absolute", left:`${a.x}%`, top:`${a.y*0.65}%`, transform:"translate(-50%,-50%)", textAlign:"center", width:110 }}>
          <div style={{ width:46, height:46, borderRadius:12, margin:"0 auto", background:"var(--panel-2)", border:`1px solid ${a.status==="active"?"var(--accent-dim)":"var(--border)"}`, display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            <div style={{ fontFamily:"var(--display)", fontSize:18, color:a.status==="active"?"var(--fg)":"var(--muted)" }}>{a.name[0]}</div>
            <div style={{ position:"absolute", top:-3, right:-3 }}><StatDot color={a.status==="active"?"var(--ok)":"var(--muted)"} size={6} pulse={a.status==="active"} /></div>
          </div>
          <div style={{ fontSize:10, color:"var(--fg)", marginTop:6, fontFamily:"var(--mono)", letterSpacing:0.5 }}>{a.name}</div>
          <div style={{ fontSize:8.5, color:"var(--muted)", fontFamily:"var(--mono)" }}>{a.calls.toLocaleString()} calls · {a.load}%</div>
        </div>
      ))}
    </div>
  );
}

function HomeView({ sys, cmdLog }) {
  return (
    <div style={{ display:"grid", gap:14 }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
        {[
          { k:"CPU",        v:`${sys.cpu}%`,   s:"live", c:"var(--accent)" },
          { k:"Memory",     v:`${sys.mem}%`,   s:"live", c:"var(--cyan)"   },
          { k:"Agents",     v:"6/7",           s:"active", c:"var(--ok)"   },
          { k:"Model",      v:"Groq",          s:"llama-3.3-70b", c:"var(--violet)" },
        ].map((k,i) => (
          <Card key={i} pad={14} className="yali-fade" style={{ animationDelay:`${i*60}ms` }}>
            <Kicker>{k.k}</Kicker>
            <div style={{ marginTop:6 }}><Display size={28} color={k.c}>{k.v}</Display></div>
            <div style={{ fontSize:10.5, color:"var(--muted)", marginTop:3, fontFamily:"var(--mono)" }}>{k.s}</div>
          </Card>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1.8fr 1fr", gap:14 }}>
        <Card kicker="Orchestrator · agent constellation" title="Yali brain — live" right={<Chip color="var(--ok)">● 6/7 active</Chip>}>
          <AgentGraph />
        </Card>
        <Card kicker="System vitals" title="Runtime">
          {[
            { label:"Wake word",  value:'"Yali"',      color:"var(--accent)" },
            { label:"LLM",        value:"Groq llama-3.3-70b", color:"var(--accent)" },
            { label:"Memory",     value:"3-tier JSON", color:"var(--fg)" },
            { label:"Voice out",  value:"pyttsx3",     color:"var(--fg)" },
            { label:"Finance",    value:"yfinance",    color:"var(--ok)" },
            { label:"MiroFish",   value:"docker:5001", color:"var(--muted)" },
            { label:"CPU",        value:`${sys.cpu}%`, color:"var(--fg)", bar:sys.cpu, barColor:"var(--accent)" },
            { label:"RAM",        value:`${sys.mem}%`, color:"var(--fg)", bar:sys.mem, barColor:"var(--cyan)" },
          ].map((r,i) => (
            <div key={i} style={{ display:"flex", flexDirection:"column", gap:4, padding:"8px 0", borderBottom:"1px solid var(--border)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <Tag>{r.label}</Tag>
                <span style={{ fontFamily:"var(--mono)", fontSize:12, color:r.color }}>{r.value}</span>
              </div>
              {r.bar!==undefined && <Bar value={r.bar} color={r.barColor} height={3} />}
            </div>
          ))}
        </Card>
      </div>

      <Card kicker="Command log · this session" title="Wake → Orchestrator → Agent" right={<Chip color="var(--accent)">{cmdLog.length} events</Chip>}>
        {cmdLog.length === 0 && <div style={{ color:"var(--muted)", fontSize:12, fontFamily:"var(--mono)", padding:"12px 0" }}>No commands yet. Say "Yali" or type a command.</div>}
        {cmdLog.map((e,i) => (
          <div key={i} style={{ display:"grid", gridTemplateColumns:"64px 1fr auto", gap:12, padding:"10px 0", borderBottom:i<cmdLog.length-1?"1px solid var(--border)":"none", alignItems:"center" }}>
            <span style={{ fontFamily:"var(--mono)", fontSize:10.5, color:"var(--muted)" }}>{e.t}</span>
            <div>
              <div style={{ fontSize:12.5, color:"var(--fg)" }}>"{e.cmd}"</div>
              <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--mono)", marginTop:2 }}>→ {e.agent} · {e.status}</div>
            </div>
            <StatDot color={e.ok?"var(--ok)":"var(--danger)"} size={6} />
          </div>
        ))}
      </Card>
    </div>
  );
}

// ─── FINANCE VIEW ─────────────────────────────────────────────────────

function FinanceView() {
  const [overview, setOverview] = React.useState(null);
  const [news, setNews]         = React.useState([]);
  const [brief, setBrief]       = React.useState("");
  const [briefLoading, setBriefLoading] = React.useState(false);
  const [preds, setPreds]       = React.useState([]);
  const [predInput, setPredInput] = React.useState("");
  const [predResult, setPredResult] = React.useState(null);
  const [predLoading, setPredLoading] = React.useState(false);

  React.useEffect(() => {
    fetch("/finance/overview").then(r=>r.json()).then(setOverview).catch(()=>{});
    fetch("/finance/news?n=5").then(r=>r.json()).then(d=>setNews(d.news||[])).catch(()=>{});
    fetch("/finance/predictions").then(r=>r.json()).then(d=>setPreds(d.predictions||[])).catch(()=>{});
    const id = setInterval(() => {
      fetch("/finance/overview").then(r=>r.json()).then(setOverview).catch(()=>{});
    }, 5*60*1000);
    return () => clearInterval(id);
  }, []);

  const getBrief = async () => {
    setBriefLoading(true);
    try {
      const r = await fetch("/finance/brief", {method:"POST"});
      const d = await r.json();
      setBrief(d.brief||"Unavailable.");
    } catch { setBrief("Error fetching brief."); }
    setBriefLoading(false);
  };

  const runPredict = async () => {
    if (!predInput.trim()) return;
    setPredLoading(true);
    setPredResult(null);
    try {
      const r = await fetch("/finance/predict", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({question:predInput}) });
      const d = await r.json();
      const txt = d.prediction || "Unavailable.";
      const lo = txt.toLowerCase();
      const dir = lo.includes("bullish")||lo.includes("rise") ? "BULLISH ▲" : lo.includes("bearish")||lo.includes("fall") ? "BEARISH ▼" : "NEUTRAL";
      const dirColor = dir.includes("BULLISH") ? "var(--ok)" : dir.includes("BEARISH") ? "var(--danger)" : "var(--muted)";
      const m = txt.match(/(\d{1,3})\s*%/);
      setPredResult({ dir, dirColor, text:txt, conf:m?parseInt(m[1]):60 });
      fetch("/finance/predictions").then(r=>r.json()).then(d=>setPreds(d.predictions||[]));
    } catch { setPredResult({ dir:"ERROR", dirColor:"var(--danger)", text:"Simulation failed.", conf:0 }); }
    setPredLoading(false);
  };

  const ticker = (key) => {
    if (!overview) return { price:"--", pct:"--", up:true };
    const d = overview[key]; if (!d||d.error) return { price:"--", pct:"--", up:true };
    return { price:`₹${(d.price||0).toLocaleString("en-IN")}`, pct:`${d.change_pct>=0?"+":""}${d.change_pct}%`, up:d.change_pct>=0 };
  };
  const N = ticker("nifty"), S = ticker("sensex"), B = ticker("banknifty");

  return (
    <div style={{ display:"grid", gap:14 }}>
      <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between" }}>
        <div>
          <Kicker>Yali Finance · yfinance · Groq analysis</Kicker>
          <div style={{ fontFamily:"var(--display)", fontSize:28, color:"var(--fg)", letterSpacing:2, marginTop:4 }}>MARKETS &amp; PREDICTION</div>
        </div>
        {overview && <Chip color="var(--ok)">● Live {overview.as_of}</Chip>}
      </div>

      {/* Ticker row */}
      <div style={{ display:"flex", gap:10 }}>
        {[["NIFTY",N],["SENSEX",S],["BANK NIFTY",B]].map(([name, d], i) => (
          <Card key={i} pad={14} style={{ flex:1 }}>
            <Tag>{name}</Tag>
            <div style={{ marginTop:6 }}><Display size={24} color="var(--fg)">{d.price}</Display></div>
            <div style={{ fontFamily:"var(--mono)", fontSize:12, color:d.up?"var(--ok)":"var(--danger)", marginTop:4 }}>{d.pct}</div>
          </Card>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1.4fr 1fr", gap:14 }}>
        {/* Brief */}
        <Card kicker="Market brief · Groq-powered" title="Morning intelligence" right={
          <button className="yali-btn-primary" onClick={getBrief} disabled={briefLoading} style={{ fontSize:10 }}>
            {briefLoading ? "Fetching..." : "Get Brief"}
          </button>
        }>
          {brief ? (
            <div style={{ fontSize:13, color:"var(--fg)", lineHeight:1.7, whiteSpace:"pre-wrap", fontFamily:"var(--mono)", fontSize:12 }}>{brief}</div>
          ) : (
            <div style={{ color:"var(--muted)", fontSize:12, fontFamily:"var(--mono)" }}>Click "Get Brief" for live market intelligence from Groq.</div>
          )}
        </Card>

        {/* News */}
        <Card kicker="Market news · live" title="Headlines">
          {news.length === 0 && <div style={{ color:"var(--muted)", fontSize:12 }}>Loading news...</div>}
          {news.map((n,i) => (
            <div key={i} style={{ padding:"10px 0", borderBottom:i<news.length-1?"1px solid var(--border)":"none" }}>
              <div style={{ fontSize:12.5, color:"var(--fg)", lineHeight:1.4 }}>{n.title}</div>
              <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--mono)", marginTop:3 }}>{n.source} · {n.published}</div>
            </div>
          ))}
        </Card>
      </div>

      {/* MiroFish Predict */}
      <Card pad={0} style={{ overflow:"hidden" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--border)", background:"linear-gradient(90deg, color-mix(in oklab, var(--violet) 10%, transparent), transparent)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <Kicker color="var(--violet)">MiroFish · swarm intelligence · Groq backend</Kicker>
            <div style={{ fontFamily:"var(--display)", fontSize:20, color:"var(--fg)", letterSpacing:2, marginTop:3 }}>YALI PREDICT</div>
          </div>
          <Chip color="var(--violet)">LLM-only mode (MiroFish offline = Groq fallback)</Chip>
        </div>
        <div style={{ padding:20, display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
          <div>
            <Kicker>Ask a prediction</Kicker>
            <div style={{ display:"flex", gap:10, marginTop:10 }}>
              <input value={predInput} onChange={e=>setPredInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&runPredict()}
                placeholder="Will Nifty rise this week? Predict INFY next week."
                style={{ flex:1, background:"var(--panel-2)", border:"1px solid var(--border)", borderRadius:8, padding:"10px 14px", color:"var(--fg)", fontSize:13, outline:"none" }} />
              <button className="yali-btn-primary" onClick={runPredict} disabled={predLoading||!predInput.trim()} style={{ whiteSpace:"nowrap" }}>
                {predLoading ? "Thinking..." : "Simulate ▶"}
              </button>
            </div>
            {predResult && (
              <div style={{ marginTop:14, background:"var(--panel-2)", borderRadius:10, padding:"14px 16px", border:"1px solid var(--border)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                  <Chip color={predResult.dirColor}>{predResult.dir}</Chip>
                  <Ring value={predResult.conf} size={48} stroke={4} color={predResult.dirColor} sub="conf" />
                </div>
                <div style={{ fontSize:12.5, color:"var(--fg)", lineHeight:1.65, whiteSpace:"pre-wrap" }}>{predResult.text}</div>
              </div>
            )}
          </div>

          {/* Prediction history */}
          <div>
            <Kicker>Prediction ledger</Kicker>
            <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:6 }}>
              {preds.length === 0 && <div style={{ color:"var(--muted)", fontSize:12, fontFamily:"var(--mono)" }}>No predictions yet.</div>}
              {preds.slice(-5).reverse().map((p,i) => {
                const dc = p.direction==="bullish"?"var(--ok)":p.direction==="bearish"?"var(--danger)":"var(--muted)";
                const oc = p.outcome==="correct"?"var(--ok)":p.outcome==="wrong"?"var(--danger)":"var(--muted)";
                return (
                  <div key={i} style={{ background:"var(--panel-2)", borderRadius:8, padding:"10px 12px", border:"1px solid var(--border)" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <span style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--muted)" }}>{p.date}</span>
                      <Chip color={dc} style={{ fontSize:9 }}>{p.direction} {p.confidence}%</Chip>
                      <Chip color={oc} style={{ fontSize:9 }}>{p.outcome}</Chip>
                    </div>
                    <div style={{ fontSize:12, color:"var(--fg)" }}>{p.question}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </Card>
    </div>
  );
}

  const [query, setQuery]   = React.useState("");

          { k:"Interviews",    v:stats.interview_count||0, c:"var(--ok)" },
          { k:"Offers",        v:stats.offer_count||0, c:"var(--ok)" },

// ─── MEMORY VIEW ─────────────────────────────────────────────────────

function MemoryView() {
  const [mem, setMem] = React.useState(null);
  const [midterm, setMidterm] = React.useState([]);

  const loadMemory = () => {
    fetch("/memory/recall").then(r=>r.json()).then(d => {
      setMem(d);
      setMidterm(d.mid_term||[]);
    }).catch(() => {
      fetch("/finance/predictions").then(r=>r.json()).then(d => {
        setMem({ predictions: d.predictions||[] });
      });
    });
  };

  React.useEffect(loadMemory, []);

  const markOutcome = async (p, outcome) => {
    await fetch("/finance/predictions", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ date: p.date, question: p.question, outcome }),
    });
    loadMemory();
  };

  const preds = mem?.predictions||[];
  const hits = preds.filter(p=>p.outcome==="correct").length;
  const misses = preds.filter(p=>p.outcome==="wrong").length;
  const decided = hits+misses;
  const acc = decided ? Math.round(hits/decided*100) : 0;
  const watchlist = mem?.watchlist||[];
  const sectors = mem?.sector_interests||[];
  const prefs = mem?.preferences||{};

  return (
    <div style={{ display:"grid", gap:14 }}>
      <div>
        <Kicker>Yali memory · 3-tier · yali_memory.json</Kicker>
        <div style={{ fontFamily:"var(--display)", fontSize:28, color:"var(--fg)", letterSpacing:2, marginTop:4 }}>WHAT YALI KNOWS</div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1.4fr", gap:14 }}>
        <Card kicker="Short-term · RAM · last 20" title="This session" right={<Chip color="var(--accent)">RAM</Chip>}>
          <div style={{ color:"var(--muted)", fontSize:12, fontFamily:"var(--mono)" }}>Session context held in RAM. Cleared on restart.</div>
          <div style={{ marginTop:10, fontFamily:"var(--mono)", fontSize:10, color:"var(--muted)" }}>→ auto-injected into every agent call</div>
        </Card>

        <Card kicker="Mid-term · json · 50 cap" title="Recent topics" right={<Chip color="var(--cyan)">{midterm.length}</Chip>}>
          {midterm.slice(-8).reverse().map((e,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:i<Math.min(midterm.length,8)-1?"1px solid var(--border)":"none" }}>
              <span style={{ fontSize:11.5, color:"var(--fg)", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.query?.slice(0,50)||"—"}</span>
              <span style={{ fontFamily:"var(--mono)", fontSize:9, color:"var(--muted)", flexShrink:0 }}>{e.ts}</span>
            </div>
          ))}
          {midterm.length === 0 && <div style={{ color:"var(--muted)", fontSize:12 }}>No mid-term memory yet.</div>}
        </Card>

        <Card kicker="Long-term · never pruned" title="Enduring context" right={<Chip color="var(--violet)">3 stores</Chip>}>
          <div style={{ marginBottom:14 }}>
            <Tag color="var(--accent)">Watchlist · {watchlist.length}</Tag>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
              {watchlist.length === 0 && <span style={{ color:"var(--muted)", fontSize:11 }}>Empty — ask about stocks to auto-populate</span>}
              {watchlist.map((w,i) => <span key={i} style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--accent)", background:"color-mix(in oklab, var(--accent) 10%, transparent)", border:"1px solid color-mix(in oklab, var(--accent) 30%, transparent)", padding:"3px 9px", borderRadius:4 }}>{w}</span>)}
            </div>
          </div>
          <div style={{ marginBottom:14 }}>
            <Tag color="var(--cyan)">Sector interests</Tag>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
              {sectors.length === 0 && <span style={{ color:"var(--muted)", fontSize:11 }}>Empty — will auto-detect</span>}
              {sectors.map((s,i) => <span key={i} style={{ fontSize:11, color:"var(--cyan)", background:"color-mix(in oklab, var(--cyan) 10%, transparent)", border:"1px solid color-mix(in oklab, var(--cyan) 30%, transparent)", padding:"3px 9px", borderRadius:4 }}>{s}</span>)}
            </div>
          </div>
          <div>
            <Tag color="var(--violet)">Preferences</Tag>
            <div style={{ marginTop:8, display:"grid", gap:4 }}>
              {Object.entries(prefs).map(([k,v]) => (
                <div key={k} style={{ display:"flex", justifyContent:"space-between", fontFamily:"var(--mono)", fontSize:11 }}>
                  <span style={{ color:"var(--muted)" }}>{k}</span>
                  <span style={{ color:"var(--fg)" }}>{String(v)}</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      <Card kicker="Prediction ledger · outcome tracking" title={`Directional accuracy · ${acc}%`} right={
        <div style={{ display:"flex", gap:8 }}>
          <Chip color="var(--ok)">✓ {hits} correct</Chip>
          <Chip color="var(--danger)">✗ {misses} wrong</Chip>
          <Chip color="var(--muted)">○ {preds.length-decided} open</Chip>
        </div>
      }>
        {preds.length === 0 && <div style={{ color:"var(--muted)", fontSize:12, fontFamily:"var(--mono)" }}>No predictions yet. Use Finance → Predict.</div>}
        {preds.length > 0 && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"70px 2fr 100px 80px 80px", padding:"6px 0", borderBottom:"1px solid var(--border)", gap:10 }}>
              {["Date","Question","Direction","Conf","Outcome"].map(h=><Tag key={h}>{h}</Tag>)}
            </div>
            {preds.slice().reverse().map((p,i) => {
              const dc = p.direction==="bullish"?"var(--ok)":p.direction==="bearish"?"var(--danger)":"var(--muted)";
              const oc = p.outcome==="correct"?"var(--ok)":p.outcome==="wrong"?"var(--danger)":"var(--muted)";
              return (
                <div key={i} style={{ display:"grid", gridTemplateColumns:"70px 2fr 100px 80px 110px", alignItems:"center", gap:10, padding:"11px 0", borderBottom:i<preds.length-1?"1px solid var(--border)":"none" }}>
                  <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--muted)" }}>{p.date}</span>
                  <span style={{ fontSize:12, color:"var(--fg)" }}>{p.question}</span>
                  <Chip color={dc}>{p.direction}</Chip>
                  <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--fg)" }}>{p.confidence}%</span>
                  {p.outcome === "pending" ? (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>markOutcome(p,"correct")} style={{ fontSize:9, padding:"3px 7px", borderRadius:4, border:"1px solid var(--ok)", background:"transparent", color:"var(--ok)", cursor:"pointer", fontFamily:"var(--mono)" }}>✓</button>
                      <button onClick={()=>markOutcome(p,"wrong")}   style={{ fontSize:9, padding:"3px 7px", borderRadius:4, border:"1px solid var(--danger)", background:"transparent", color:"var(--danger)", cursor:"pointer", fontFamily:"var(--mono)" }}>✗</button>
                    </div>
                  ) : (
                    <Chip color={oc}>{p.outcome}</Chip>
                  )}
                </div>
              );
            })}
          </>
        )}
      </Card>
    </div>
  );
}

// ─── ASSISTANT VIEW ───────────────────────────────────────────────────

function AssistantView({ ws }) {
  const [messages, setMessages] = React.useState([
    { role:"assistant", text:"Raja — Yali online.\n\nType a command or ask anything. I will route it through the orchestrator.\n\nTry: 'market update', 'open chrome', 'predict Nifty', or any system command." }
  ]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const send = async (text) => {
    if (!text.trim() || loading) return;
    const cmd = text.trim();
    setMessages(m => [...m, { role:"user", text:cmd }]);
    setInput("");
    setLoading(true);
    try {
      const r = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: cmd}),
      });
      const d = await r.json();
      setMessages(m => [...m, { role:"assistant", text: d.reply || d.error || "No response." }]);
    } catch {
      setMessages(m => [...m, { role:"assistant", text:"Connection error. Is Yali server running?" }]);
    }
    setLoading(false);
  };

  const prompts = [
    "Market brief for today",
    "Predict Nifty this week",
    "Open Chrome",
    "What do you know about me?",
    "Search Python jobs Toronto",
  ];

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 300px", gap:14, height:"calc(100vh - 118px)" }}>
      <div style={{ display:"flex", flexDirection:"column", gap:12, minHeight:0 }}>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between" }}>
          <div>
            <Kicker>Assistant · Groq llama-3.3-70b · memory injected</Kicker>
            <div style={{ fontFamily:"var(--display)", fontSize:26, color:"var(--fg)", letterSpacing:2, marginTop:3 }}>YALI COMMAND</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <StatDot color="var(--ok)" size={7} pulse />
            <span style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--ok)", textTransform:"uppercase", letterSpacing:1.5 }}>Wake: "Yali"</span>
          </div>
        </div>

        <Card pad={0} style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0 }}>
          <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"16px 18px", display:"flex", flexDirection:"column", gap:12 }}>
            {messages.map((m,i) => (
              <div key={i} style={{ display:"flex", gap:10, justifyContent:m.role==="user"?"flex-end":"flex-start", animation:"yali-fade-in 0.3s ease" }}>
                {m.role==="assistant" && (
                  <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0, background:"radial-gradient(circle, color-mix(in oklab, var(--accent) 25%, var(--panel-2)), var(--panel-2))", border:"1px solid var(--accent-dim)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--display)", fontSize:12, color:"var(--accent)", alignSelf:"flex-end" }}>Y</div>
                )}
                <div style={{ maxWidth:"76%", padding:"10px 14px", fontSize:13, lineHeight:1.58, borderRadius:m.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px", background:m.role==="user"?"color-mix(in oklab, var(--accent) 18%, var(--panel-2))":"var(--panel-2)", border:"1px solid var(--border)", color:"var(--fg)", whiteSpace:"pre-wrap" }}>{m.text}</div>
              </div>
            ))}
            {loading && (
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ width:26, height:26, borderRadius:"50%", background:"radial-gradient(circle, color-mix(in oklab, var(--accent) 25%, var(--panel-2)), var(--panel-2))", border:"1px solid var(--accent-dim)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--display)", fontSize:12, color:"var(--accent)" }}>Y</div>
                <div style={{ padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--border)", borderRadius:"14px 14px 14px 3px", display:"flex", gap:5, alignItems:"center" }}>
                  {[0,1,2].map(j=><div key={j} style={{ width:6, height:6, borderRadius:"50%", background:"var(--accent)", animation:`yali-dot 1.2s ${j*0.15}s infinite` }} />)}

            )}
          </div>
          <div style={{ padding:"8px 14px", borderTop:"1px solid var(--border)", display:"flex", gap:6, flexWrap:"wrap" }}>
            {prompts.map((p,i) => <button key={i} className="yali-btn" onClick={()=>send(p)} style={{ fontSize:10 }}>{p}</button>)}
          </div>
          <div style={{ padding:"10px 12px", borderTop:"1px solid var(--border)", display:"flex", gap:10, alignItems:"center" }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="Type or speak to Yali… ↵ send" style={{ flex:1, background:"transparent", border:"none", outline:"none", color:"var(--fg)", fontSize:13 }} />
            <button onClick={()=>send(input)} disabled={!input.trim()||loading} className="yali-btn-primary" style={{ opacity:input.trim()?1:0.45 }}>SEND ➤</button>
          </div>
        </Card>
      </div>

        <Card kicker="Interview MIND" title="Live assist" pad={14}>
          <div style={{ marginBottom:10 }}>
            <input id="mind-q" placeholder="Paste interview question..." style={{ width:"100%", background:"var(--panel-2)", border:"1px solid var(--border)", borderRadius:8, padding:"8px 12px", color:"var(--fg)", fontSize:12, outline:"none", marginBottom:8 }} />

              const q = document.getElementById("mind-q").value.trim();
              if(!q) return;
              const r = await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:`Interview question: ${q}`})});

              setMessages(m=>[...m,{role:"assistant",text:`[MIND] ${d.reply||"Answer generated."}`}]);
            }}>Get Answer</button>
          </div>
          <div style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--muted)" }}>STAR · SOAR · behavioral frameworks</div>
        </Card>

        <Card kicker="Quick actions" title="System shortcuts" pad={14}>
          {["Open Chrome","Open VS Code","Search the web","Create a file","System status"].map((a,i)=>(
            <button key={i} className="yali-btn" onClick={()=>send(a)} style={{ width:"100%", marginBottom:6, textAlign:"left", fontSize:11 }}>{a}</button>
          ))}
        </Card>
      </div>
    </div>
  );
}

          document.getElementById("review-out").innerText = JSON.stringify(d, null, 2);
        }}>Analyze</button>
        <div id="review-out" style={{ marginTop:10, background:"var(--panel-2)", borderRadius:8, padding:"12px", fontSize:11, color:"var(--fg)", fontFamily:"var(--mono)", whiteSpace:"pre-wrap", border:"1px solid var(--border)" }}>Analysis will appear here...</div>
      </Card>
    </div>
  );
}

// ─── SHELL ────────────────────────────────────────────────────────────

const NAV = [
  { id:"home",       label:"Command",   glyph:"⬡" },
  { id:"finance",    label:"Finance",   glyph:"◈" },
  { id:"jobs",       label:"JobRadar",  glyph:"◎" },
  { id:"interviews", label:"Interviews",glyph:"◷" },
  { id:"memory",     label:"Memory",    glyph:"◬" },
  { id:"assistant",  label:"Assistant", glyph:"✦" },
];

function Sidebar({ active, onNav }) {
  return (
    <div style={{ width:78, background:"var(--panel)", borderRight:"1px solid var(--border)", display:"flex", flexDirection:"column", alignItems:"center", padding:"16px 0", gap:4, flexShrink:0, zIndex:20 }}>
      <div style={{ width:44, height:44, borderRadius:12, background:"radial-gradient(circle, color-mix(in oklab, var(--accent) 30%, var(--panel-2)), var(--panel-2))", border:"1px solid var(--accent-dim)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--display)", fontSize:22, color:"var(--accent)", letterSpacing:2, marginBottom:20, boxShadow:"0 0 20px color-mix(in oklab, var(--accent) 25%, transparent)" }}>Y</div>
      {NAV.map(n => {
        const isActive = active === n.id;
        return (
          <button key={n.id} onClick={()=>onNav(n.id)} style={{ width:58, height:56, border:"none", cursor:"pointer", background:isActive?"color-mix(in oklab, var(--accent) 10%, transparent)":"transparent", color:isActive?"var(--accent)":"var(--muted)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, borderLeft:isActive?"2px solid var(--accent)":"2px solid transparent", borderRadius:0, transition:"all 0.15s" }}>
            <span style={{ fontSize:18 }}>{n.glyph}</span>
            <span style={{ fontSize:8.5, textTransform:"uppercase", letterSpacing:1, fontFamily:"var(--mono)" }}>{n.label}</span>
          </button>
        );
      })}
      <div style={{ marginTop:"auto", textAlign:"center", fontFamily:"var(--mono)", fontSize:8.5, color:"var(--border-strong)", letterSpacing:1.5 }}><div>YALI</div><div>v2</div></div>
    </div>
  );
}

function Topbar({ time, ticker }) {
  const items = ticker.length ? ticker : [
    {sym:"NIFTY",price:"--",pct:"--",up:true},{sym:"SENSEX",price:"--",pct:"--",up:true},{sym:"BNKNIFTY",price:"--",pct:"--",up:true}
  ];
  const doubled = [...items,...items];
  return (
    <div style={{ height:54, background:"var(--panel)", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", padding:"0 18px", gap:16, flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
        <StatDot color="var(--ok)" size={7} pulse />
        <span style={{ fontFamily:"var(--mono)", fontSize:10.5, color:"var(--ok)", textTransform:"uppercase", letterSpacing:1.5 }}>systems online · "yali"</span>
      </div>
      <div style={{ width:1, height:22, background:"var(--border)" }} />
      <div style={{ flex:1, overflow:"hidden", position:"relative", maskImage:"linear-gradient(90deg, transparent, black 40px, black calc(100% - 40px), transparent)" }}>
        <div style={{ display:"flex", gap:32, animation:"yali-ticker 50s linear infinite", whiteSpace:"nowrap" }}>
          {doubled.map((s,i) => (
            <span key={i} style={{ fontFamily:"var(--mono)", fontSize:11, display:"inline-flex", gap:6 }}>
              <span style={{ color:"var(--muted)", letterSpacing:1 }}>{s.sym}</span>
              <span style={{ color:"var(--fg)" }}>{s.price}</span>
              {s.pct!=="--" && <span style={{ color:s.up?"var(--ok)":"var(--danger)" }}>{s.up?"▲":"▼"}{typeof s.pct==="number"?Math.abs(s.pct).toFixed(2):s.pct}%</span>}
            </span>
          ))}
        </div>
      </div>
      <div style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--muted)", letterSpacing:1 }}>
        {time.toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short"}).toUpperCase()} · <span style={{ color:"var(--fg)" }}>{time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span> IST
      </div>
      <div style={{ width:32, height:32, borderRadius:"50%", background:"linear-gradient(135deg, var(--accent), var(--indigo))", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--display)", fontSize:14, color:"#fff", letterSpacing:1 }}>R</div>
    </div>
  );
}

function applyConfig(cfg) {
  const r = document.documentElement.style;
  r.setProperty("--accent",     `oklch(65% 0.17 ${cfg.accentHue})`);
  r.setProperty("--accent-dim", `oklch(45% 0.12 ${cfg.accentHue})`);
  r.setProperty("--indigo",     `oklch(60% 0.18 ${cfg.accentHue+20})`);
  r.setProperty("--violet",     `oklch(62% 0.17 ${(cfg.accentHue+60)%360})`);
  r.setProperty("--cyan",       `oklch(70% 0.13 ${(cfg.accentHue-30+360)%360})`);
  r.setProperty("--display", cfg.displayFont);
  const themes = {
    deep:     {bg:"oklch(10% 0.012 240)",panel:"oklch(13% 0.015 240)",panel2:"oklch(16% 0.015 240)",border:"oklch(22% 0.02 240)",bs:"oklch(30% 0.025 240)"},
    midnight: {bg:"oklch(8% 0.01 260)",panel:"oklch(11% 0.012 260)",panel2:"oklch(14% 0.013 260)",border:"oklch(20% 0.018 260)",bs:"oklch(28% 0.022 260)"},
    obsidian: {bg:"oklch(6% 0.003 250)",panel:"oklch(10% 0.005 250)",panel2:"oklch(13% 0.006 250)",border:"oklch(18% 0.01 250)",bs:"oklch(26% 0.013 250)"},
  };
  const t = themes[cfg.theme]||themes.deep;
  r.setProperty("--bg",t.bg); r.setProperty("--panel",t.panel); r.setProperty("--panel-2",t.panel2); r.setProperty("--border",t.border); r.setProperty("--border-strong",t.bs);
  const pads={compact:"12px",comfy:"16px",spacious:"20px"};
  r.setProperty("--card-pad",pads[cfg.density]||"16px");
}

function TweaksPanel({ open, onClose, config, setConfig }) {
  if (!open) return null;
  const accents = [{name:"Arc Blue",hue:225},{name:"JARVIS",hue:195},{name:"Emerald",hue:155},{name:"Amber",hue:42},{name:"Crimson",hue:0},{name:"Violet",hue:280}];
  return (
    <div style={{ position:"fixed", right:20, bottom:20, zIndex:100, width:300, background:"var(--panel)", border:"1px solid var(--accent-dim)", borderRadius:14, boxShadow:"0 20px 60px rgba(0,0,0,0.5)", padding:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div><Kicker color="var(--accent)">Live controls</Kicker><div style={{ fontFamily:"var(--display)", fontSize:16, color:"var(--fg)", letterSpacing:2, marginTop:2 }}>TWEAKS</div></div>
        <button onClick={onClose} className="yali-btn" style={{ padding:"4px 10px" }}>✕</button>
      </div>
      <Tag>Accent</Tag>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginTop:6, marginBottom:14 }}>
        {accents.map(a => <button key={a.name} onClick={()=>setConfig({...config,accentHue:a.hue})} style={{ padding:"8px 6px", borderRadius:6, cursor:"pointer", background:`oklch(65% 0.18 ${a.hue})`, border:config.accentHue===a.hue?"2px solid #fff":"1px solid var(--border)", color:"#fff", fontSize:9.5, fontFamily:"var(--mono)" }}>{a.name}</button>)}
      </div>
      <Tag>Theme</Tag>
      <div style={{ display:"flex", gap:6, marginTop:6, marginBottom:14 }}>
        {["deep","midnight","obsidian"].map(t=><button key={t} onClick={()=>setConfig({...config,theme:t})} className={config.theme===t?"yali-btn-primary":"yali-btn"} style={{ flex:1, fontSize:10 }}>{t}</button>)}
      </div>
      <Tag>Density</Tag>
      <div style={{ display:"flex", gap:6, marginTop:6 }}>
        {["compact","comfy","spacious"].map(t=><button key={t} onClick={()=>setConfig({...config,density:t})} className={config.density===t?"yali-btn-primary":"yali-btn"} style={{ flex:1, fontSize:10 }}>{t}</button>)}
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────

function App() {
  const [tab, setTab]       = React.useState(()=>{ try{return localStorage.getItem("yali-tab")||"home"}catch{return"home"} });
  const [time, setTime]     = React.useState(new Date());
  const [sys, setSys]       = React.useState({ cpu:0, mem:0 });
  const [cmdLog, setCmdLog] = React.useState([]);
  const [ticker, setTicker] = React.useState([]);
  const [config, setConfig] = React.useState({ accentHue:218, theme:"deep", density:"comfy", displayFont:"'Bebas Neue', sans-serif" });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Clock
  React.useEffect(() => { const t=setInterval(()=>setTime(new Date()),1000); return ()=>clearInterval(t); }, []);

  // Save tab
  React.useEffect(() => { try{localStorage.setItem("yali-tab",tab)}catch{} }, [tab]);

  // Apply theme
  React.useEffect(() => { applyConfig(config); }, [config]);

  // Load initial ticker
  React.useEffect(() => {
    fetch("/finance/overview").then(r=>r.json()).then(d=>{
      const items = [];
      if(d.nifty&&!d.nifty.error) items.push({sym:"NIFTY",price:`₹${(d.nifty.price||0).toLocaleString("en-IN")}`,pct:d.nifty.change_pct,up:d.nifty.change_pct>=0});
      if(d.sensex&&!d.sensex.error) items.push({sym:"SENSEX",price:`₹${(d.sensex.price||0).toLocaleString("en-IN")}`,pct:d.sensex.change_pct,up:d.sensex.change_pct>=0});
      if(d.banknifty&&!d.banknifty.error) items.push({sym:"BNKNIFTY",price:`₹${(d.banknifty.price||0).toLocaleString("en-IN")}`,pct:d.banknifty.change_pct,up:d.banknifty.change_pct>=0});
      setTicker(items);
    }).catch(()=>{});
  }, []);

  // WebSocket
  useYaliWS(msg => {
    if (msg.type === "system") {
      setSys({ cpu: msg.cpu||0, mem: msg.mem||0 });
    }
    if (msg.type === "ticker" && msg.data) {
      const d = msg.data;
      const items = [];
      if(d.nifty&&!d.nifty.error) items.push({sym:"NIFTY",price:`₹${(d.nifty.price||0).toLocaleString("en-IN")}`,pct:d.nifty.change_pct,up:d.nifty.change_pct>=0});
      if(d.sensex&&!d.sensex.error) items.push({sym:"SENSEX",price:`₹${(d.sensex.price||0).toLocaleString("en-IN")}`,pct:d.sensex.change_pct,up:d.sensex.change_pct>=0});
      if(d.banknifty&&!d.banknifty.error) items.push({sym:"BNKNIFTY",price:`₹${(d.banknifty.price||0).toLocaleString("en-IN")}`,pct:d.banknifty.change_pct,up:d.banknifty.change_pct>=0});
      setTicker(items);
    }
    if (msg.pipeline === "completed") {
      const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      setCmdLog(l => [{t, cmd:msg.task||"—", agent:"orchestrator", status:"done", ok:true}, ...l.slice(0,19)]);
    }
  });

  const views = {
    home:       <HomeView sys={sys} cmdLog={cmdLog} />,
    finance:    <FinanceView />,
    jobs:       <JobsView />,
    interviews: <InterviewsView />,
    memory:     <MemoryView />,
    assistant:  <AssistantView />,
  };

  return (
    <div style={{ display:"flex", height:"100vh", background:"var(--bg)", color:"var(--fg)", overflow:"hidden" }}>
      <Sidebar active={tab} onNav={setTab} />
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
        <Topbar time={time} ticker={ticker} />
        {/* Tweaks toggle */}
        <button onClick={()=>setTweaksOpen(o=>!o)} style={{ position:"fixed", bottom:20, right:tweaksOpen?330:20, zIndex:99, width:38, height:38, borderRadius:"50%", background:"var(--panel-2)", border:"1px solid var(--accent-dim)", color:"var(--accent)", cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center", transition:"right 0.2s" }}>⚙</button>
        <div style={{ flex:1, overflowY:"auto", overflowX:"hidden", padding:18, background:"var(--bg)" }}>
          {views[tab]}
        </div>
      </div>
      <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} config={config} setConfig={setConfig} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
