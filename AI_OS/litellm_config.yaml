# litellm proxy — bridges MiroFish OpenAI SDK calls to Groq
# Start: litellm --config litellm_config.yaml --port 4000

model_list:
  - model_name: gpt-4
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

litellm_settings:
  drop_params: true
